<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento — Portfólio</title>
  <style>
    :root {
      --branco: #ffffff;
      --preto: #000000;
      --margem: 10px;
      --texto: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: #1c1c1e;          /* canvas escuro ao redor do "celular" */
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    /* moldura mobile centralizada */
    .app {
      position: relative;
      max-width: 430px;
      margin: 0 auto;
      background: var(--preto);
      color: var(--branco);
      font-weight: 500;            /* medium */
      font-size: var(--texto);
    }

    /* HEADER: fixo no topo, centralizado sobre a coluna, transparente */
    .header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--margem);
    }
    .header a {
      color: var(--branco);
      text-decoration: none;
      font-size: var(--texto);
      font-weight: 500;
    }

    /* PROJETO: cada um ocupa a tela inteira */
    .projeto {
      position: relative;
      width: 100%;
      height: 100vh;
      background: var(--preto);
      overflow: hidden;
    }
    .projeto__video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .projeto__nome {
      position: absolute;
      bottom: var(--margem);
      left: var(--margem);
      z-index: 2;
      color: var(--branco);
      font-size: var(--texto);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <a href="index.html">Bento</a>
      <a href="#">Projetos</a>
    </header>

    <main id="projetos"></main>
  </div>

  <script>
    // ===== Lista de projetos (temporária — vai virar fetch no Sanity) =====
    const projetos = [
      { nome: "Projeto 1", video: "videos/projeto-1.webm", link: "projeto.html" },
      { nome: "Projeto 2", video: "videos/projeto-2.webm" },
      { nome: "Projeto 3", video: "videos/projeto-3.webm" },
    ];

    const container = document.querySelector("#projetos");

    projetos.forEach((projeto) => {
      const section = document.createElement("section");
      section.className = "projeto";
      section.innerHTML = `
        <video class="projeto__video" autoplay loop muted playsinline>
          <source src="${projeto.video}" type="video/webm">
        </video>
        <span class="projeto__nome">${projeto.nome}</span>
      `;
      if (projeto.link) {
        section.style.cursor = "pointer";
        section.addEventListener("click", () => { window.location.href = projeto.link; });
      }
      container.appendChild(section);
    });
  </script>
</body>
</html>
