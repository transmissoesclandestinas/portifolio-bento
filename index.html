<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Bento — Portfólio</title>
    <style>
      :root {
        --branco: #ffffff;
        --preto: #000000;
        --margem: 10px;
        --texto: 16px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* scroll snap: cada projeto ocupa a tela e trava no lugar */
      html {
        scroll-snap-type: y mandatory;
      }

      body {
        background: var(--preto);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--branco);
      }

      .app {
        width: 100%;
      }

      /* HEADER: fixo no topo, largura total */
      .header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: var(--margem) 10px;
        font-weight: 500;
        font-size: var(--texto);
      }
      .header a {
        color: var(--branco);
        text-decoration: none;
        font-size: var(--texto);
        font-weight: 500;
      }

      /* PROJETO: cada seção ocupa 100% da tela e trava no scroll */
      .projeto {
        position: relative;
        width: 100%;
        height: 100vh;
        background: var(--preto);
        overflow: hidden;
        cursor: pointer;
        scroll-snap-align: start;
      }
      .projeto__video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .projeto__nome {
        position: absolute;
        bottom: var(--margem);
        left: 20px;
        z-index: 2;
        color: var(--branco);
        font-size: var(--texto);
        font-weight: 500;
      }

      /* responsivo: padding maior em telas grandes */
      @media (min-width: 768px) {
        .header {
          padding: var(--margem) 40px;
        }
        .projeto__nome {
          left: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <a href="index.html">AV</a>
        <a href="#">Projetos</a>
      </header>
      <main id="projetos"></main>
    </div>

    <script>
      const SANITY_PROJECT_ID = "e673yj2i";
      const SANITY_DATASET = "production";
      const SANITY_API_VER = "2024-01-01";

      function sanityFetch(query, params = {}) {
        const base = `https://${SANITY_PROJECT_ID}.api.sanity.io/v${SANITY_API_VER}/data/query/${SANITY_DATASET}`;
        const q = `query=${encodeURIComponent(query)}`;
        const p = Object.entries(params)
          .map(
            ([k, v]) =>
              `${encodeURIComponent("$" + k)}=${encodeURIComponent(JSON.stringify(v))}`,
          )
          .join("&");
        return fetch(`${base}?${q}${p ? "&" + p : ""}`)
          .then((r) => r.json())
          .then((d) => d.result);
      }

      async function init() {
        const projetos = await sanityFetch(
          `*[_type == "projeto"] | order(_createdAt asc) {
          nome,
          "slug": slug.current,
          "capaUrl": capa.asset->url
        }`,
        );

        const container = document.querySelector("#projetos");
        if (!projetos || projetos.length === 0) return;

        projetos.forEach((projeto) => {
          const section = document.createElement("section");
          section.className = "projeto";

          let mediaHTML = "";
          if (projeto.capaUrl) {
            if (projeto.capaUrl.includes(".webm")) {
              mediaHTML = `<video class="projeto__video" autoplay loop muted playsinline src="${projeto.capaUrl}"></video>`;
            } else {
              mediaHTML = `<img class="projeto__video" src="${projeto.capaUrl}" alt="${projeto.nome}">`;
            }
          }

          section.innerHTML = `
          ${mediaHTML}
          <span class="projeto__nome">${projeto.nome}</span>
        `;

          section.addEventListener("click", () => {
            window.location.href = `projeto.html?slug=${projeto.slug}`;
          });

          container.appendChild(section);
        });
      }

      init();
    </script>
  </body>
</html>
